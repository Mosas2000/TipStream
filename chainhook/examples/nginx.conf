# Example Nginx Configuration for Chainhook Metrics Access Control

upstream chainhook_backend {
    server 127.0.0.1:3101 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Rate limiting configuration
limit_req_zone $binary_remote_addr zone=metrics_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# Log format for metrics requests
log_format metrics_access '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'response_time=$request_time auth=$http_authorization';

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name chainhook.example.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name chainhook.example.com;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/chainhook.crt;
    ssl_certificate_key /etc/ssl/private/chainhook.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Access logs
    access_log /var/log/nginx/chainhook-access.log;
    error_log /var/log/nginx/chainhook-error.log;

    # Health check endpoint - always accessible (no authentication, no rate limiting)
    location /health {
        access_log /var/log/nginx/chainhook-health.log;
        proxy_pass http://chainhook_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Metrics endpoint - IP-based access control (reverse proxy pattern)
    location /metrics {
        access_log /var/log/nginx/chainhook-metrics.log metrics_access;

        # IP allowlist for internal monitoring infrastructure
        allow 10.0.1.100;           # Prometheus server
        allow 10.0.2.50;            # Grafana server
        allow 192.168.1.0/24;       # Corporate network
        allow 172.20.0.0/16;        # Kubernetes pods
        deny all;

        # Rate limiting
        limit_req zone=metrics_limit burst=20 nodelay;

        proxy_pass http://chainhook_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Bearer token passthrough (if application-level auth is needed)
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;

        # Caching
        proxy_cache off;
    }

    # API endpoints - public access with rate limiting
    location /api/ {
        access_log /var/log/nginx/chainhook-api.log;

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://chainhook_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # Caching for read-only endpoints
        proxy_cache_valid 200 60s;
        proxy_cache_bypass $http_pragma $http_authorization;
    }

    # Root endpoint
    location / {
        return 404;
    }
}

# Alternative pattern: Certificate with Bearer Token in Application
# This example shows IP allowlist + application-level bearer token
server {
    listen 443 ssl http2;
    server_name chainhook-hybrid.example.com;

    ssl_certificate /etc/ssl/certs/chainhook.crt;
    ssl_certificate_key /etc/ssl/private/chainhook.key;

    # Metrics with both IP allowlist and token passthrough
    location /metrics {
        # Allow only internal IPs
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://chainhook_backend;

        # Preserve Authorization header for backend token validation
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://chainhook_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
