<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="240" fill="url(#ring)" stroke="#334155" stroke-width="4"/>
  <!-- Inner glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.25"/>
  <!-- Lightning bolt -->
  <path d="M 290 80 L 200 240 L 260 240 L 222 432 L 340 220 L 270 220 Z" fill="url(#bolt)"/>
  <!-- Stream lines - left -->
  <path d="M 134 190 Q 160 210, 190 200" stroke="url(#stream)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 110 260 Q 140 270, 175 256" stroke="url(#stream)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M 128 330 Q 155 340, 185 320" stroke="url(#stream)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Stream lines - right -->
  <path d="M 340 190 Q 365 210, 390 195" stroke="url(#stream)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 350 270 Q 375 280, 405 262" stroke="url(#stream)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M 335 340 Q 360 350, 385 332" stroke="url(#stream)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Spark dots -->
  <circle cx="290" cy="82" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="226" cy="428" r="4" fill="#f97316" opacity="0.7"/>
</svg>
