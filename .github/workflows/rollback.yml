name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target-version:
        description: Version or commit to rollback to
        required: true
        type: string
      environment:
        description: Environment to rollback
        required: true
        type: choice
        options:
          - production
          - preview

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for rollback
        working-directory: frontend
        env:
          VITE_NETWORK: mainnet
          VITE_APP_URL: https://tipstream-silk.vercel.app
        run: npm run build

      - name: Verify rollback build
        run: |
          if [ ! -f "frontend/dist/index.html" ]; then
            echo "Rollback build failed: index.html not found"
            exit 1
          fi
          echo "Rollback build verification passed"

      - name: Deploy rollback to ${{ github.event.inputs.environment }}
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          scope: ${{ secrets.VERCEL_ORG_ID }}
          prod: ${{ github.event.inputs.environment == 'production' }}

      - name: Smoke test rollback
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            URL="https://tipstream-silk.vercel.app"
          else
            URL="${{ steps.vercel.outputs.preview-url }}"
          fi
          echo "Testing rollback URL: $URL"
          curl -f -s "$URL" | grep -q "TipStream" && echo "Rollback successful" || exit 1

      - name: Create rollback record
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Rollback executed: ${{ github.event.inputs.environment }}',
              body: 'Rolled back to ${{ github.event.inputs.target-version }}',
              labels: ['deployment', 'rollback']
            });

      - name: Notify slack (optional)
        if: always()
        run: |
          echo "Rollback to ${{ github.event.inputs.target-version }} in ${{ github.event.inputs.environment }} completed"
